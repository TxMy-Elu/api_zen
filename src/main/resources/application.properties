spring.application.name=api_zen

# ── Base de données ───────────────────────────────────────────────────────────
# ${VAR:valeur_defaut} : lit la variable d'env, sinon utilise la valeur par défaut
# En Docker, DB_HOST sera "db" (nom du service). En local, "localhost"
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:cesizen_dev}?serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Retry de connexion BDD au démarrage (utile en Docker : MySQL peut être lent à init)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000

# ── JPA ───────────────────────────────────────────────────────────────────────
# Hibernate 7 (Spring Boot 4) ne détecte plus le dialect automatiquement
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# update = crée/met à jour les tables sans les supprimer (safe en dev et prod)
# Surchargé en prod via application-prod.properties → validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Init BDD ──────────────────────────────────────────────────────────────────
spring.sql.init.platform=init
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Upload fichiers ───────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:2b08f636d91d6881969ff4cd835afe50bca3ca5619a088bf532b17ffaeb9c07c}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Email ─────────────────────────────────────────────────────────────────────
app.mail.enabled=${MAIL_ENABLED:true}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:cesizenrecover@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Frontend URL ──────────────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── Actuator / Monitoring ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
# Ajoute le tag "application" sur toutes les métriques (requis par le dashboard)
management.metrics.tags.application=${spring.application.name}
# Active les métriques HikariCP (pool de connexions BDD)
management.metrics.enable.hikaricp=true
# Active les métriques Tomcat (threads, erreurs, sessions)
server.tomcat.mbeanregistry.enabled=true

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
