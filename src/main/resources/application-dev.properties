# ── Profil DEV ────────────────────────────────────────────────────────────────
# Activé avec : SPRING_PROFILES_ACTIVE=dev
# En local, Spring Boot le détecte automatiquement si tu le passes en variable

# Hibernate recrée les tables si nécessaire (pratique en dev)
spring.jpa.hibernate.ddl-auto=update

# Logs SQL activés pour déboguer les requêtes
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Niveau de log verbeux
logging.level.edu.tx.api_zen=DEBUG
logging.level.org.springframework.security=DEBUG

# Swagger activé (déjà le défaut, redondant mais explicite)
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
