# ── Profil PROD ───────────────────────────────────────────────────────────────
# Activé avec : SPRING_PROFILES_ACTIVE=prod
# Injecté automatiquement via la variable d'env dans docker-compose / CI/CD

# Hibernate ne touche pas au schéma en prod (validate = vérifie seulement)
spring.jpa.hibernate.ddl-auto=validate

# Pas de SQL dans les logs (données sensibles + performance)
spring.jpa.show-sql=false

# Logs réduits au minimum
logging.level.edu.tx.api_zen=WARN
logging.level.org.springframework=WARN

# Swagger désactivé en prod (ne pas exposer la doc de l'API publiquement)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
