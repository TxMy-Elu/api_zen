global:
  # Fréquence de collecte des métriques : toutes les 15 secondes
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus se surveille lui-même (utile pour déboguer)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Collecte des métriques de l'API Spring Boot
  # "api" = nom du service dans docker-compose
  # /actuator/prometheus = endpoint exposé par Spring Boot Micrometer
  - job_name: 'cesizen-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['api:8080']
