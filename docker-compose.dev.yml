# ── Override DEV ──────────────────────────────────────────────────────────────
# Usage : docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Différences avec la base :
#   - BD : cesizen_dev (isolée de la prod)
#   - MySQL exposé sur 3306 (accès direct depuis outils locaux)
#   - phpMyAdmin activé sur :8082
#   - Prometheus exposé sur :9090 (pour déboguer les métriques)

services:

  db:
    environment:
      MYSQL_DATABASE: cesizen_dev
    # En dev on peut accéder directement à MySQL depuis l'hôte (DBeaver, etc.)
    ports:
      - "3306:3306"

  api:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_NAME: cesizen_dev

  # ── phpMyAdmin — uniquement en dev ─────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cesizen-net

  # Prometheus accessible depuis le navigateur en dev
  prometheus:
    ports:
      - "9090:9090"
