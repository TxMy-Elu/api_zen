version: 2
updates:

  # Dépendances Maven (API Spring Boot)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
    groups:
      # jjwt-api / -impl / -jackson doivent toujours être bumpés ensemble
      jjwt:
        patterns:
          - "io.jsonwebtoken:*"
      # Idem pour les artefacts Jackson (BOM importé dans le pom)
      jackson:
        patterns:
          - "com.fasterxml.jackson*:*"
          - "tools.jackson*:*"

  # Dépendances Docker (images dans docker-compose)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions (versions des actions utilisées)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
