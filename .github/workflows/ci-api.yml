name: CI — api_zen

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ── 1. Build + Tests + Coverage ─────────────────────────────────────────────
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    services:
      mysql:
        image: mysql:8.4.7
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_DB_ROOT_PASSWORD }}
          MYSQL_DATABASE: cesizen_dev
          MYSQL_USER: ${{ secrets.CI_DB_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -p$CI_DB_ROOT_PASSWORD --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Historique complet requis par SonarCloud

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilation + Tests + JaCoCo
        run: mvn clean verify -B
        env:
          DB_HOST: localhost
          DB_NAME: cesizen_dev
          DB_USERNAME: ${{ secrets.CI_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          SPRING_PROFILES_ACTIVE: dev
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAIL_ENABLED: "false"

      - name: Analyse SonarCloud
        if: env.SONAR_TOKEN != ''
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar \
            -Dsonar.projectKey=TxMy-Elu_api_zen \
            -Dsonar.organization=txmy-elu \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publier les résultats de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Publier le JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # ── 2. Scan secrets Gitleaks ─────────────────────────────────────────────────
  gitleaks:
    name: Scan Gitleaks (secrets)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_REPORT_FORMAT: sarif
          GITLEAKS_REPORT_PATH: gitleaks-report.sarif

      - name: Publier le rapport Gitleaks
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 7

  # ── 3. Scan Trivy ────────────────────────────────────────────────────────────
  trivy:
    name: Scan Trivy (image Docker)
    runs-on: ubuntu-latest
    needs: [build, gitleaks]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Télécharger le JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build image Docker
        run: docker build -t cesizen-api:${{ github.sha }} .

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cesizen-api:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Publier le rapport Trivy
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 7
