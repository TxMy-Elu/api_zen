name: CI — api_zen

# ── Déclencheurs ──────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'   # feature/xxx
      - 'fix/**'       # fix/xxx
      - 'hotfix/**'    # hotfix/xxx
    tags:
      - 'v*.*.*'       # v1.0.0, v1.2.3 etc.
  pull_request:
    branches:
      - main
      - develop

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build + Tests Maven ──────────────────────────────────────────────────
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    # Service MySQL pour les tests d'intégration (@SpringBootTest)
    services:
      mysql:
        image: mysql:8.4.7
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_DB_ROOT_PASSWORD }}
          MYSQL_DATABASE: cesizen_dev
          MYSQL_USER: ${{ secrets.CI_DB_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -p$CI_DB_ROOT_PASSWORD --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven        # Cache ~/.m2 entre les runs

      - name: Compilation + Tests
        run: mvn clean verify -B
        # -B = batch mode (pas d'interaction, logs propres)
        # verify = compile + test + package
        env:
          DB_HOST: localhost
          DB_NAME: cesizen_dev
          DB_USERNAME: ${{ secrets.CI_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          SPRING_PROFILES_ACTIVE: dev
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAIL_ENABLED: "false"   # Désactive l'envoi d'emails en CI

      - name: Publier les résultats de tests
        uses: actions/upload-artifact@v4
        if: always()          # Même si les tests échouent
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Publier le JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # ── 2. Scan secrets Gitleaks ────────────────────────────────────────────────
  gitleaks:
    name: Scan Gitleaks (secrets)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # Historique complet pour scanner tous les commits

      - name: Scan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_REPORT_FORMAT: sarif
          GITLEAKS_REPORT_PATH: gitleaks-report.sarif
        # La config .gitleaks.toml est automatiquement détectée

      - name: Publier le rapport Gitleaks
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 7

  # ── 3. Scan de sécurité Trivy ───────────────────────────────────────────────
  trivy:
    name: Scan Trivy (image Docker)
    runs-on: ubuntu-latest
    needs: [build, gitleaks]  # Lance après build ET scan secrets

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Télécharger le JAR buildé
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build de l'image Docker (pour le scan)
        run: docker build -t cesizen-api:${{ github.sha }} .

      - name: Scan Trivy — vulnerabilités critiques et hautes
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cesizen-api:${{ github.sha }}
          format: table
          exit-code: '1'           # Fail le CI si CRITICAL ou HIGH trouvé
          ignore-unfixed: true     # Ignore les CVE sans patch disponible
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Publier le rapport Trivy
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 7
