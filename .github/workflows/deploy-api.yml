name: CD — deploy api_zen

on:
  # Déclenchement automatique après CI réussie sur main
  workflow_run:
    workflows: ["CI — api_zen"]
    types: [completed]
    branches: [main]

  # Déclenchement manuel (tag ou sha spécifique)
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag image à déployer (ex: latest, sha-abc1234)'
        required: false
        default: 'latest'

jobs:

  build-push:
    name: Build & Push GHCR
    runs-on: ubuntu-latest
    # Pour workflow_run : ne démarre que si la CI a réussi
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build & Push image vers GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    # Déploiement uniquement si le secret DEPLOY_HOST est configuré
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Déploiement sur VPS via SSH
        if: env.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            TAG=${{ needs.build-push.outputs.image_tag }}
            IMAGE_TAG=$TAG docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api
            IMAGE_TAG=$TAG docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
            docker image prune -f

      - name: Pas de VPS configuré — déploiement ignoré
        if: env.DEPLOY_HOST == ''
        run: echo "DEPLOY_HOST non configuré — image poussée sur GHCR, déploiement SSH ignoré."
