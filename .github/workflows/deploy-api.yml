name: CD — deploy api_zen

# Déclenchement manuel uniquement (pas de VPS configuré pour l'instant)
# À activer quand le serveur de production sera prêt :
#   - Remplacer workflow_dispatch par workflow_run (voir commentaire ci-dessous)
#   - Renseigner les secrets DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH
#
# on:
#   workflow_run:
#     workflows: ["CI — api_zen"]
#     types: [completed]
#     branches: [main]
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag image à déployer (ex: latest, sha-abc1234)'
        required: false
        default: 'latest'

jobs:

  deploy:
    name: Build, Push GHCR & Deploy
    runs-on: ubuntu-latest
    # Retirer la condition ci-dessous quand on passe en workflow_run automatique
    # if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production   # Gate manuel optionnel (configurable dans GitHub Environments)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build & Push image vers GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Déploiement sur VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            TAG=${{ github.event.inputs.image_tag || 'latest' }}
            IMAGE_TAG=$TAG docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api
            IMAGE_TAG=$TAG docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
            docker image prune -f
