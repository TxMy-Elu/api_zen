name: ✨ Fonctionnalité
description: Proposer une évolution de l'API CESIZen
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: besoin
    attributes:
      label: Besoin
      description: Quel problème utilisateur cette évolution résout-elle ?
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User story
      placeholder: "En tant que <rôle>, je veux <action> afin de <bénéfice>."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Critères d'acceptation
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Périmètre
      options:
        - API (Spring Boot)
        - Frontend (Next.js)
        - Infrastructure / CI-CD
        - Documentation
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes techniques
      description: Impacts BDD, sécurité, endpoints concernés… (facultatif)
