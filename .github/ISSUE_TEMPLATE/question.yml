name: ❓ Question
description: Demander une clarification sur l'API, l'architecture ou le déploiement
title: "[Question] "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Formule ta question de façon autonome — sans contexte extérieur.
    validations:
      required: true

  - type: textarea
    id: contexte
    attributes:
      label: Contexte
      description: Ce que tu as déjà tenté, lu ou consulté.
    validations:
      required: false

  - type: dropdown
    id: domaine
    attributes:
      label: Domaine
      options:
        - API (Spring Boot)
        - Frontend (Next.js)
        - Base de données
        - Sécurité
        - Infrastructure / CI-CD
        - Documentation
    validations:
      required: true

  - type: checkboxes
    id: verifications
    attributes:
      label: Vérifications préalables
      options:
        - label: J'ai consulté le dossier `docs/` et le wiki
          required: true
        - label: J'ai cherché parmi les issues existantes (ouvertes et fermées)
          required: true
