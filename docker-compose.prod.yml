# ── Override PROD ─────────────────────────────────────────────────────────────
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    restart: always

  api:
    # En prod : image publiée par le pipeline CD (pas de build local)
    image: ghcr.io/${GITHUB_REPOSITORY:-txmy-elu/api_zen}:${IMAGE_TAG:-latest}
    build: !reset {}
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_DATABASE: cesizen_prod
      MAIL_ENABLED: "true"

  db:
    restart: always
    environment:
      MYSQL_DATABASE: cesizen_prod
    # MySQL non exposé en prod — accessible uniquement via le réseau Docker interne
    ports: !reset []

volumes:
  certbot-www:
  certbot-certs:
