services:

  # ── Base de données MySQL ───────────────────────────────────────────────────
  db:
    image: mysql:8.4.7
    restart: always
    command: --mysql-native-password=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cesizen_dev}
      MYSQL_USER: ${DB_USERNAME:-cesizen_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cesizen_app_password}
    volumes:
      - data:/var/lib/mysql
    networks:
      - cesizen-net
    healthcheck:
      # MYSQL_PWD évite les problèmes de caractères spéciaux avec -p
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── API Spring Boot ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE:-cesizen_dev}
      DB_USERNAME: ${DB_USERNAME:-cesizen_app}
      DB_PASSWORD: ${DB_PASSWORD:-cesizen_app_password}
      JWT_SECRET: ${JWT_SECRET:-cesizen-secret-key-very-long-for-security-256-bits-minimum-required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cesizen-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Prometheus — collecte des métriques ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - cesizen-net
    depends_on:
      - api
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'

  # ── Grafana — visualisation des métriques ───────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - cesizen-net

volumes:
  data:
  prometheus-data:
  grafana-data:

networks:
  cesizen-net:
    driver: bridge
