services:

  # ── Reverse proxy — seul conteneur exposé vers l'extérieur ─────────────────
  nginx:
    image: nginx:alpine
    container_name: cesizen_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - cesizen-net

  # ── API Spring Boot ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cesizen_api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE:-cesizen_dev}
      DB_USERNAME: ${DB_USERNAME:-cesizen_app}
      DB_PASSWORD: ${DB_PASSWORD:-cesizen_app_password}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-mailer}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cesizen-net
    healthcheck:
      # wget est fourni par busybox dans l'image Alpine ; curl n'y est pas installé.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Base de données MySQL ───────────────────────────────────────────────────
  db:
    image: mysql:8.4.7
    container_name: cesizen_db
    restart: unless-stopped
    command: --mysql-native-password=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cesizen_dev}
      MYSQL_USER: ${DB_USERNAME:-cesizen_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cesizen_app_password}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - cesizen-net
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  db-data:

networks:
  cesizen-net:
    driver: bridge
