# ── Stack Monitoring — optionnelle ────────────────────────────────────────────
# Usage dev   : docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# Usage prod  : docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
#
# Tous les ports de supervision sont liés a 127.0.0.1 : consultables en local
# ou via un tunnel SSH, jamais joignables depuis Internet. Seul Nginx expose
# des ports sur l'interface publique.

services:

  # ── Base de données — provisionnement du compte de supervision ─────────────
  db:
    environment:
      MYSQL_EXPORTER_PASSWORD: ${MYSQL_EXPORTER_PASSWORD}
    volumes:
      - ./docker/mysql/02-exporter-user.sh:/docker-entrypoint-initdb.d/02-exporter-user.sh:ro

  # ── Prometheus — collecte métriques ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: cesizen_prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - cesizen-net

  # ── Grafana — dashboards métriques + logs ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: cesizen_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: "lokiLogs"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/cesizen.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - cesizen-net

  # ── Loki — stockage et indexation des logs ─────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: cesizen_loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - cesizen-net

  # ── Promtail — agent collecte logs Docker → Loki ───────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: cesizen_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - cesizen-net

  # ── Node Exporter — métriques système (CPU, RAM, disque) ──────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: cesizen_node_exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - cesizen-net

  # ── MySQL Exporter — métriques BDD (QPS, InnoDB, connexions) ──────────────
  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: cesizen_mysqld_exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9104:9104"
    environment:
      # Compte dédié en lecture seule, créé par docker/mysql/02-exporter-user.sh.
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_EXPORTER_PASSWORD}
    command:
      - '--mysqld.username=exporter'
      - '--mysqld.address=db:3306'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cesizen-net

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
